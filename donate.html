<!DOCTYPE html>
<html>
<head>
    <title>Donate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Make a Donation</h2>

<div class="form-box">

<label>Donation Type</label>
<select>
    <option>Food</option>
    <option>Groceries</option>
    <option>Clothes</option>
</select>

<label>Monetary Donation</label>
<select>
    <option>Food for 3 people (₹450)</option>
    <option>Groceries for 5 people (₹1000)</option>
    <option>Healthcare Support</option>
</select>

<input type="number" placeholder="Custom Amount">

<h3>Payment Details</h3>
<p>Scan QR or use bank details</p>

<img src="https://via.placeholder.com/150" alt="QR Code">

<p>Account No: 1234567890</p>
<p>IFSC: ABCD0001234</p>

<label>Upload Payment Proof</label>
<input type="file">

<button>Submit Donation</button>

</div>

<script src="script.js"></script>
</body>
</html>
